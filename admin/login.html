<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CreatorHub 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .login-logo-icon {
            font-size: 2.5rem;
            color: #818cf8;
        }
        .login-logo-text {
            font-size: 1.75rem;
            font-weight: 700;
            color: #fff;
        }
        .login-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .login-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-footer {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .login-footer p {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 8px;
        }
        .login-footer a {
            color: #818cf8;
            text-decoration: none;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .user-info {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .user-info h3 {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .user-info p {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.2);
        }
        .admin-link {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 16px;
        }
        .admin-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 16px;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <span class="login-logo-icon">✦</span>
            <span class="login-logo-text">CreatorHub</span>
        </div>

        <h1 class="login-title">内容管理后台</h1>
        <p class="login-subtitle">通过 Netlify Identity 进行身份验证</p>

        <div id="loginSection">
            <div class="alert alert-success">
                点击下方按钮使用 GitHub 账号登录
            </div>
            <button class="login-btn" id="loginBtn" onclick="login()">
                使用 GitHub 登录
            </button>
        </div>

        <div id="userSection" style="display: none;">
            <div class="user-info">
                <h3 id="userName">用户名</h3>
                <p id="userEmail">邮箱</p>
            </div>
            <a href="/admin/index.html" class="admin-link">
                进入管理后台
            </a>
            <button class="login-btn logout-btn" onclick="logout()">
                退出登录
            </button>
        </div>

        <div class="login-footer">
            <p>需要管理员权限？请联系网站所有者</p>
            <p><a href="/">返回网站首页</a></p>
        </div>
    </div>

    <script>
        function login() {
            const currentSite = window.location.hostname;
            if (currentSite === 'localhost' || currentSite === '127.0.0.1') {
                alert('本地开发环境请使用: npx decap-server\n或访问 Netlify 部署后的 /admin/login.html');
                return;
            }
            window.netlifyIdentity.open('login');
        }

        function logout() {
            window.netlifyIdentity.logout();
        }

        function onLogin(user) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userSection').style.display = 'block';
            if (user) {
                document.getElementById('userName').textContent = user.user_metadata?.full_name || user.email;
                document.getElementById('userEmail').textContent = user.email;
            }
        }

        if (window.netlifyIdentity) {
            window.netlifyIdentity.on('init', user => {
                if (user) {
                    onLogin(user);
                }
            });

            window.netlifyIdentity.on('login', user => {
                window.netlifyIdentity.close();
                onLogin(user);
            });

            window.netlifyIdentity.on('logout', () => {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('userSection').style.display = 'none';
            });
        } else {
            document.querySelector('.alert-success').textContent = 'Netlify Identity 未加载，请确保已部署到 Netlify';
            document.querySelector('.alert-success').className = 'alert alert-error';
            document.getElementById('loginBtn').disabled = true;
        }
    </script>
</body>
</html>
