<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息管理 - CreatorHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #ec4899;
            --dark: #0f172a;
            --dark-light: #1e293b;
            --gray: #64748b;
            --gray-light: #94a3b8;
            --gray-lighter: #cbd5e1;
            --white: #ffffff;
            --bg-light: #f8fafc;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --transition: all 0.3s ease;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-light);
            color: var(--dark);
            min-height: 100vh;
        }
        
        .container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: var(--dark);
            color: var(--white);
            padding: 24px 0;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text { font-size: 20px; font-weight: 700; }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--gray-light);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        
        .nav-item:hover { background: rgba(255,255,255,0.1); color: var(--white); }
        .nav-item.active { background: rgba(99,102,241,0.2); color: var(--primary-light); border-right: 3px solid var(--primary); }
        
        .main-content { flex: 1; margin-left: 260px; padding: 24px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header h1 { font-size: 24px; font-weight: 700; }
        
        .back-btn {
            padding: 10px 20px;
            background: var(--bg-light);
            border: 1px solid var(--gray-lighter);
            border-radius: var(--radius);
            color: var(--dark);
            text-decoration: none;
            font-size: 14px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 14px; color: var(--gray); margin-top: 4px; }
        
        .messages-list {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        
        .message-item {
            padding: 20px;
            border-bottom: 1px solid var(--gray-lighter);
            cursor: pointer;
            transition: var(--transition);
        }
        
        .message-item:hover { background: var(--bg-light); }
        .message-item.unread { border-left: 4px solid var(--primary); }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        
        .message-sender { font-weight: 600; }
        .message-time { font-size: 13px; color: var(--gray); }
        
        .message-subject {
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--dark);
        }
        
        .message-preview {
            font-size: 14px;
            color: var(--gray);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .message-detail {
            position: fixed;
            top: 0; right: -500px;
            width: 500px;
            height: 100vh;
            background: var(--white);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 1000;
            padding: 24px;
            overflow-y: auto;
        }
        
        .message-detail.show { right: 0; }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-lighter);
        }
        
        .detail-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }
        
        .detail-field {
            margin-bottom: 16px;
        }
        
        .detail-label {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 15px;
            color: var(--dark);
        }
        
        .detail-content {
            background: var(--bg-light);
            padding: 16px;
            border-radius: var(--radius);
            margin-top: 16px;
            white-space: pre-wrap;
            line-height: 1.6;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: var(--radius);
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-unread { background: #fef3c7; color: #d97706; }
        .badge-read { background: #e0f2fe; color: #0284c7; }
        
        .action-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <span class="logo-text">CreatorHub</span>
            </div>
            <nav>
                <a class="nav-item" href="./index.html"><span>📊</span><span>仪表盘</span></a>
                <a class="nav-item" href="./content-editor.html"><span>📝</span><span>内容编辑</span></a>
                <a class="nav-item active" href="./messages.html"><span>📧</span><span>消息管理</span></a>
                <a class="nav-item" href="./account-settings.html"><span>⚙️</span><span>账户设置</span></a>
                <a class="nav-item" id="logoutNav"><span>🚪</span><span>退出登录</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <h1>消息管理</h1>
                <a href="./index.html" class="back-btn">← 返回仪表盘</a>
            </header>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总消息数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="unreadCount">0</div>
                    <div class="stat-label">未读消息</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="todayCount">0</div>
                    <div class="stat-label">今日消息</div>
                </div>
            </div>
            
            <div class="messages-list" id="messagesList">
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>暂无消息</p>
                </div>
            </div>
        </main>
    </div>
    
    <div class="message-detail" id="messageDetail">
        <div class="detail-header">
            <h2>消息详情</h2>
            <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div id="detailContent"></div>
    </div>

    <script>
        const MESSAGES_KEY = 'contact_messages';
        let messages = [];
        
        function loadMessages() {
            const data = localStorage.getItem(MESSAGES_KEY);
            messages = data ? JSON.parse(data) : [];
            updateStats();
            renderMessages();
        }
        
        function updateStats() {
            const today = new Date().toLocaleDateString('zh-CN');
            document.getElementById('totalCount').textContent = messages.length;
            document.getElementById('unreadCount').textContent = messages.filter(m => !m.read).length;
            document.getElementById('todayCount').textContent = messages.filter(m => m.time && m.time.startsWith(today)).length;
        }
        
        function renderMessages() {
            const list = document.getElementById('messagesList');
            
            if (messages.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无消息</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = messages.map(msg => `
                <div class="message-item ${!msg.read ? 'unread' : ''}" onclick="showDetail(${msg.id})">
                    <div class="message-header">
                        <span class="message-sender">${msg.name} <span class="badge ${!msg.read ? 'badge-unread' : 'badge-read'}">${!msg.read ? '未读' : '已读'}</span></span>
                        <span class="message-time">${msg.time || '未知时间'}</span>
                    </div>
                    <div class="message-subject">${getSubjectText(msg.subject)}</div>
                    <div class="message-preview">${msg.email} - ${msg.message.substring(0, 50)}...</div>
                </div>
            `).join('');
        }
        
        function getSubjectText(subject) {
            const subjects = {
                'cooperation': '🤝 商务合作',
                'consultation': '💬 咨询问题',
                'feedback': '📝 意见反馈',
                'other': '📌 其他'
            };
            return subjects[subject] || subject;
        }
        
        function showDetail(id) {
            const msg = messages.find(m => m.id === id);
            if (!msg) return;
            
            // 标记为已读
            msg.read = true;
            localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
            updateStats();
            renderMessages();
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-field">
                    <div class="detail-label">发送者</div>
                    <div class="detail-value">${msg.name}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">邮箱</div>
                    <div class="detail-value"><a href="mailto:${msg.email}" style="color: var(--primary);">${msg.email}</a></div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">主题</div>
                    <div class="detail-value">${getSubjectText(msg.subject)}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">时间</div>
                    <div class="detail-value">${msg.time}</div>
                </div>
                <div class="detail-field">
                    <div class="detail-label">消息内容</div>
                    <div class="detail-content">${msg.message}</div>
                </div>
                <div class="action-bar">
                    <a href="mailto:${msg.email}?subject=回复: ${getSubjectText(msg.subject)}" class="btn btn-primary">回复邮件</a>
                    <button class="btn btn-danger" onclick="deleteMessage(${msg.id})">删除</button>
                </div>
            `;
            
            document.getElementById('messageDetail').classList.add('show');
        }
        
        function closeDetail() {
            document.getElementById('messageDetail').classList.remove('show');
        }
        
        function deleteMessage(id) {
            if (!confirm('确定要删除这条消息吗？')) return;
            
            messages = messages.filter(m => m.id !== id);
            localStorage.setItem(MESSAGES_KEY, JSON.stringify(messages));
            updateStats();
            renderMessages();
            closeDetail();
        }
        
        document.getElementById('logoutNav').addEventListener('click', () => {
            localStorage.removeItem('admin_session');
            window.location.href = './login.html';
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            const session = localStorage.getItem('admin_session');
            if (!session) {
                window.location.href = './login.html';
                return;
            }
            loadMessages();
        });
    </script>
</body>
</html>
